<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - VetUrgence+ | Conseils urgences vétérinaires</title>
    <meta name="description" content="Conseils et guides pour les urgences vétérinaires en France. Trouvez un vétérinaire ouvert 24h/24 près de chez vous.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; background: #f5f5f5; }
        header { background: #7f1d1d; color: white; padding: 20px; text-align: center; }
        header h1 { font-size: 1.8em; margin-bottom: 10px; }
        header p { font-size: 1em; opacity: 0.9; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .cta { background: #7f1d1d; color: white; padding: 15px; border-radius: 8px; text-align: center; margin: 20px 0; }
        .cta a { color: white; text-decoration: none; font-weight: bold; font-size: 1.1em; }
        .article { background: white; padding: 25px; margin: 20px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .article h2 { color: #7f1d1d; margin-bottom: 15px; font-size: 1.5em; }
        .article-meta { color: #666; font-size: 0.9em; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .article-content { line-height: 1.8; }
        .article-content h2 { font-size: 1.2em; margin-top: 20px; margin-bottom: 10px; }
        .article-content p { margin-bottom: 15px; }
        .article-content ul { margin: 15px 0; padding-left: 25px; }
        .article-content li { margin-bottom: 8px; }
        .loading { text-align: center; padding: 40px; color: #666; font-size: 1.1em; }
        footer { text-align: center; padding: 20px; color: #666; margin-top: 40px; }
        .back-link { display: inline-block; margin: 20px 0; color: #7f1d1d; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <h1>🐾 Blog VetUrgence+</h1>
        <p>Conseils et guides pour les urgences vétérinaires</p>
    </header>

    <div class="container">
        <a href="/" class="back-link">← Retour à l'accueil</a>

        <div class="cta">
            <p style="margin-bottom: 10px;">Besoin d'un vétérinaire en urgence ?</p>
            <a href="/">→ Trouver un véto ouvert maintenant</a>
        </div>

        <div id="articles-container">
            <div class="loading">Chargement des articles...</div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 VetUrgence+ - Tous droits réservés</p>
    </footer>

    <script>
        const BIN_ID = "6a391059f5f4af5e291c4556";
        const ACCESS_KEY = "$2a$10$h1XMLJEcptAshWoSJQct6OiZ4h0bbodOs62u/PdNRvgfz6CUQtoja";

        async function loadArticles() {
            try {
                const response = await fetch("https://api.jsonbin.io/v3/b/" + BIN_ID + "/latest", {
                    headers: {
                        "X-Access-Key": ACCESS_KEY
                    }
                });

                const data = await response.json();
                const articles = data.record.articles || [];

                displayArticles(articles);
            } catch (error) {
                console.error("Erreur:", error);
                document.getElementById("articles-container").innerHTML =
                    '<p class="loading">Impossible de charger les articles pour le moment.</p>';
            }
        }

        function displayArticles(articles) {
            const container = document.getElementById("articles-container");

            if (articles.length === 0) {
                container.innerHTML = '<p class="loading">Aucun article pour le moment. Revenez bientôt !</p>';
                return;
            }

            container.innerHTML = articles.map(function(article) {
                const date = new Date(article.date).toLocaleDateString("fr-FR", {
                    year: "numeric",
                    month: "long",
                    day: "numeric"
                });
                return '<article class="article">' +
                    '<h2>' + article.title + '</h2>' +
                    '<div class="article-meta">📍 ' + article.city + ' • 📅 ' + date + '</div>' +
                    '<div class="article-content">' + article.content + '</div>' +
                    '</article>';
            }).join("");
        }

        loadArticles();
    </script>
</body>
</html>
