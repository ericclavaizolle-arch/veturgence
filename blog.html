<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - VetUrgence+</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        header { background: #7f1d1d; color: white; padding: 20px; text-align: center; }
        header h1 { font-size: 2em; margin-bottom: 10px; }
        .article { background: white; padding: 30px; margin: 20px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .article h2 { color: #7f1d1d; margin-bottom: 15px; }
        .article-meta { color: #666; font-size: 0.9em; margin-bottom: 20px; }
        .article-content { line-height: 1.8; }
        .cta { background: #7f1d1d; color: white; padding: 15px; border-radius: 8px; text-align: center; margin: 20px 0; }
        .cta a { color: white; text-decoration: none; font-weight: bold; }
        .loading { text-align: center; padding: 40px; color: #666; }
        footer { text-align: center; padding: 20px; color: #666; margin-top: 40px; }
    </style>
</head>
<body>
    <header>
        <h1>🐾 Blog VetUrgence+</h1>
        <p>Conseils et guides pour les urgences vétérinaires</p>
    </header>

    <div class="container">
        <div class="cta">
            <p>Besoin d'un vétérinaire en urgence ?</p>
            <a href="/">→ Trouver un véto maintenant</a>
        </div>

        <div id="articles-container">
            <div class="loading">Chargement des articles...</div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 VetUrgence+ - Tous droits réservés</p>
    </footer>

    <script>
        // Configuration JSONBin
        const BIN_ID = '6a391059f5f4af5e291c4556';
        const API_KEY = '$2a$10$OVqB7Uy09cCk3.bcwdZ2vuQ4DEZQQQQQQQQQQP3VgAWNQN5Y2';

        // Charger les articles
        async function loadArticles() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: {
                        'X-Master-Key': API_KEY
                    }
                });
                
                const data = await response.json();
                const articles = data.record.articles || [];
                
                displayArticles(articles);
            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('articles-container').innerHTML = 
                    '<p class="loading">Impossible de charger les articles pour le moment.</p>';
            }
        }

        // Afficher les articles
        function displayArticles(articles) {
            const container = document.getElementById('articles-container');
            
            if (articles.length === 0) {
                container.innerHTML = '<p class="loading">Aucun article pour le moment.</p>';
                return;
            }

            container.innerHTML = articles.map(article => `
                <article class="article">
                    <h2>${article.title}</h2>
                    <div class="article-meta">
                        📍 ${article.city} • 📅 ${new Date(article.date).toLocaleDateString('fr-FR')}
                    </div>
                    <div class="article-content">
                        ${article.content}
                    </div>
                </article>
            `).join('');
        }

        // Charger au démarrage
        loadArticles();
    </script>
</body>
</html>
