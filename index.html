<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetUrgence | Urgences Animales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { display: none; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col justify-between items-center min-h-screen p-4">

    <div class="bg-white rounded-3xl shadow-xl max-w-sm w-full p-6 text-center border border-gray-100 relative mt-4">
        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">VetUrgence<span class="text-red-800">+</span></h1>
        <div class="inline-block bg-red-50 text-red-800 font-bold text-xs px-4 py-1 rounded-full my-3 tracking-wide">Urgences animales 24h/24</div>
        <button onclick="document.getElementById('modal-symptomes').classList.add('active')" class="w-full bg-red-800 hover:bg-red-900 text-white font-bold py-4 px-6 rounded-2xl mt-6">
            Analyser les symptômes ➔
        </button>
    </div>

    <div id="modal-symptomes" class="modal fixed inset-0 bg-black/50 justify-center items-center p-4 z-50">
        <div class="bg-white rounded-3xl max-w-sm w-full p-6 text-left relative">
            <button onclick="document.getElementById('modal-symptomes').classList.remove('active')" class="absolute top-4 right-4 text-gray-400 text-lg">&times;</button>
            <h3 class="text-lg font-bold text-slate-900 mb-4">Décrivez l'urgence</h3>
            <div class="grid grid-cols-3 gap-2 mb-4">
                <button onclick="selectAnimal('Chien')" id="btn-chien" class="animal-btn border-2 border-red-800 bg-red-50 text-red-800 font-semibold py-2 rounded-xl text-sm">🐶 Chien</button>
                <button onclick="selectAnimal('Chat')" id="btn-chat" class="animal-btn border border-gray-200 text-slate-700 font-semibold py-2 rounded-xl text-sm">🐱 Chat</button>
                <button onclick="selectAnimal('Autre')" id="btn-autre" class="animal-btn border border-gray-200 text-slate-700 font-semibold py-2 rounded-xl text-sm">🐾 Autre</button>
            </div>
            <textarea id="symptomes-text" rows="4" class="w-full border border-gray-200 rounded-xl p-3 text-sm mb-4" placeholder="Ex: Mon chien vomit..."></textarea>
            <button onclick="triggerPayment()" class="w-full bg-red-800 text-white font-bold py-3 rounded-xl">Analyser maintenant</button>
        </div>
    </div>

    <script>
        let selectedAnimalType = "Chien";
        function selectAnimal(type) {
            selectedAnimalType = type;
            document.querySelectorAll('.animal-btn').forEach(b => {
                b.className = 'animal-btn border border-gray-200 text-slate-700 font-semibold py-2 rounded-xl text-sm';
            });
            document.getElementById(`btn-${type.toLowerCase()}`).className = 'animal-btn border-2 border-red-800 bg-red-50 text-red-800 font-semibold py-2 rounded-xl text-sm';
        }

        async function triggerPayment() {
            const texte = document.getElementById('symptomes-text').value.trim();
            if(!texte) return alert("Décrivez les symptômes.");

            try {
                const response = await fetch("https://avrkezveyrbvhpzpiyyb.supabase.co/functions/v1/smooth-handler", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: `${selectedAnimalType} : ${texte}` })
                });
                
                const data = await response.json();
                if(data && data.length > 0) {
                    const i = data[0];
                    alert("Diagnostic : " + i["Suspicion de maladie(s)"] + "\nUrgence : " + i["État d'urgence"]);
                } else { alert("Aucun résultat."); }
            } catch (err) { alert("Erreur réseau : " + err.message); }
        }
    </script>
</body>
</html>
